<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    user-select: none;
    overflow: hidden;
  }

  .game-wrapper {
    text-align: center;
  }

  h1 {
    color: #e94560;
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    letter-spacing: 4px;
  }

  .score-board {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 12px;
  }

  .score-item {
    color: #c0c0d0;
    font-size: 1.1rem;
  }

  .score-item span {
    color: #0f3460;
    background: #e94560;
    padding: 2px 12px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1.2rem;
  }

  canvas {
    display: block;
    margin: 0 auto;
    border: 2px solid #16213e;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(233, 69, 96, 0.15), 0 0 60px rgba(15, 52, 96, 0.3);
    background: #0f0f1a;
  }

  .controls {
    margin-top: 16px;
    color: #6a6a8a;
    font-size: 0.9rem;
    line-height: 1.8;
  }

  .controls kbd {
    background: #16213e;
    color: #e94560;
    border: 1px solid #e94560;
    border-radius: 4px;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 0.85rem;
  }

  .game-over-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10;
    justify-content: center;
    align-items: center;
  }

  .game-over-overlay.active { display: flex; }

  .game-over-card {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 16px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 0 50px rgba(233,69,96,0.3);
    animation: popIn 0.3s ease-out;
  }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .game-over-card h2 {
    color: #e94560;
    font-size: 2rem;
    margin-bottom: 10px;
  }

  .game-over-card .final-score {
    color: #c0c0d0;
    font-size: 1.3rem;
    margin-bottom: 24px;
  }

  .game-over-card .final-score em {
    color: #e94560;
    font-style: normal;
    font-weight: bold;
    font-size: 1.6rem;
  }

  .btn {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-size: 1.1rem;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 2px;
  }

  .btn:hover {
    background: #c73650;
    box-shadow: 0 0 20px rgba(233,69,96,0.5);
    transform: scale(1.05);
  }

  .btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="game-wrapper">
  <h1>🐍 贪 吃 蛇</h1>

  <div class="score-board">
    <div class="score-item">🍎 得分 <span id="score">0</span></div>
    <div class="score-item">🏆 最高 <span id="highScore">0</span></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="controls">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向 &nbsp;|&nbsp;
    <kbd>Space</kbd> 暂停 &nbsp;|&nbsp;
    <kbd>R</kbd> 重新开始
  </div>
</div>

<div class="game-over-overlay" id="overlay">
  <div class="game-over-card">
    <h2>💀 游戏结束</h2>
    <p class="final-score">得分 <em id="finalScore">0</em></p>
    <button class="btn" id="restartBtn">🔄 再来一局</button>
  </div>
</div>

<script>
  (function() {
    // ── Canvas setup ──────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    const GRID_SIZE = 20;       // 每格像素
    const COLS      = 25;       // 列数
    const ROWS      = 25;       // 行数

    canvas.width  = COLS * GRID_SIZE;
    canvas.height = ROWS * GRID_SIZE;

    // ── DOM ───────────────────────────────────────────
    const scoreEl         = document.getElementById('score');
    const highScoreEl     = document.getElementById('highScore');
    const finalScoreEl    = document.getElementById('finalScore');
    const overlay         = document.getElementById('overlay');
    const restartBtn      = document.getElementById('restartBtn');

    // ── Game state ────────────────────────────────────
    let snake = [];
    let food  = null;
    let dir   = { x: 1, y: 0 };       // 当前方向
    let nextDir = { x: 1, y: 0 };     // 缓冲方向（防止一帧内反向）
    let score = 0;
    let highScore = 0;
    let gameLoop = null;
    let isRunning = true;
    let isPaused = false;
    let speed = 100;                   // ms per tick

    // 从 localStorage 读取最高分
    try {
      const saved = localStorage.getItem('snake-high-score');
      if (saved) highScore = parseInt(saved, 10) || 0;
    } catch (_) { /* ignore */ }
    highScoreEl.textContent = highScore;

    // ── Helpers ───────────────────────────────────────
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function cellKey(x, y) {
      return `${x},${y}`;
    }

    // ── Spawn food ────────────────────────────────────
    function spawnFood() {
      const occupied = new Set(snake.map(s => cellKey(s.x, s.y)));
      const free = [];
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          if (!occupied.has(cellKey(x, y))) {
            free.push({ x, y });
          }
        }
      }
      if (free.length === 0) return null; // 胜利（蛇填满棋盘）
      const idx = randomInt(0, free.length);
      food = { ...free[idx] };

      // 偶尔生成金色特殊食物（更高分）
      food.special = Math.random() < 0.15;
    }

    // ── Init / reset ──────────────────────────────────
    function init() {
      const startX = Math.floor(COLS / 2);
      const startY = Math.floor(ROWS / 2);
      snake = [
        { x: startX,     y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY },
      ];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      speed   = 100;
      isPaused = false;
      scoreEl.textContent = score;
      overlay.classList.remove('active');
      spawnFood();
    }

    // ── Tick ──────────────────────────────────────────
    function tick() {
      if (!isRunning || isPaused) return;

      // 应用缓冲方向
      dir = { ...nextDir };

      const head = snake[0];
      const newHead = {
        x: head.x + dir.x,
        y: head.y + dir.y,
      };

      // ── 撞墙检测 ──────────────────────────────────
      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        return gameOver();
      }

      // ── 撞自己检测 ─────────────────────────────────
      if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
        return gameOver();
      }

      snake.unshift(newHead);

      // ── 吃到食物？ ─────────────────────────────────
      if (food && newHead.x === food.x && newHead.y === food.y) {
        const points = food.special ? 5 : 1;
        score += points;
        scoreEl.textContent = score;
        spawnFood();
        // 提速
        if (speed > 45) {
          speed -= 2;
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    // ── Draw ──────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 网格线
      ctx.strokeStyle = 'rgba(22, 33, 62, 0.6)';
      ctx.lineWidth   = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID_SIZE, 0);
        ctx.lineTo(x * GRID_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID_SIZE);
        ctx.lineTo(canvas.width, y * GRID_SIZE);
        ctx.stroke();
      }

      // 食物
      if (food) {
        const fx = food.x * GRID_SIZE + GRID_SIZE / 2;
        const fy = food.y * GRID_SIZE + GRID_SIZE / 2;
        const r  = GRID_SIZE / 2 - 2;

        if (food.special) {
          // 金色特效
          const glow = ctx.createRadialGradient(fx, fy, r * 0.3, fx, fy, r + 4);
          glow.addColorStop(0, '#ffd700');
          glow.addColorStop(0.6, '#ff8c00');
          glow.addColorStop(1, 'rgba(255,140,0,0)');
          ctx.beginPath();
          ctx.arc(fx, fy, r + 4, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();

          // 星星形状
          drawStar(fx, fy, r * 0.7, '#ffd700');
        } else {
          // 红色苹果
          const grad = ctx.createRadialGradient(fx - 2, fy - 2, r * 0.1, fx, fy, r);
          grad.addColorStop(0, '#ff6b6b');
          grad.addColorStop(1, '#c0392b');
          ctx.beginPath();
          ctx.arc(fx, fy, r, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }
      }

      // 蛇身
      snake.forEach((seg, i) => {
        const sx = seg.x * GRID_SIZE;
        const sy = seg.y * GRID_SIZE;
        const pad = 1;

        if (i === 0) {
          // 蛇头
          ctx.fillStyle = '#4ecca3';
          ctx.shadowColor = '#4ecca3';
          ctx.shadowBlur = 8;
          roundRect(sx + pad, sy + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, 6);
          ctx.fill();
          ctx.shadowBlur = 0;

          // 眼睛
          const cx = sx + GRID_SIZE / 2;
          const cy = sy + GRID_SIZE / 2;
          const eyeR = 2.5;
          let ex1, ey1, ex2, ey2;
          if (dir.x === 1)  { ex1 = cx + 4; ey1 = cy - 4; ex2 = cx + 4; ey2 = cy + 4; }
          else if (dir.x === -1) { ex1 = cx - 4; ey1 = cy - 4; ex2 = cx - 4; ey2 = cy + 4; }
          else if (dir.y === -1) { ex1 = cx - 4; ey1 = cy - 4; ex2 = cx + 4; ey2 = cy - 4; }
          else                  { ex1 = cx - 4; ey1 = cy + 4; ex2 = cx + 4; ey2 = cy + 4; }
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.arc(ex1, ey1, 1.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(ex2, ey2, 1.2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // 蛇身渐变
          const t = i / Math.max(snake.length - 1, 1);
          const r = Math.floor(30  + t * 20);
          const g = Math.floor(200 - t * 60);
          const b = Math.floor(130 - t * 40);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          roundRect(sx + pad, sy + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, 5);
          ctx.fill();
        }
      });

      // 暂停提示
      if (isPaused) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 28px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⏸ 暂停中', canvas.width / 2, canvas.height / 2);
        ctx.textAlign = 'start';
      }
    }

    function drawStar(cx, cy, r, color) {
      const spikes = 5;
      const outerR = r;
      const innerR = r * 0.45;
      let rot = Math.PI / 2 * 3;
      const step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerR);
      for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
        rot += step;
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ── Game over ─────────────────────────────────────
    function gameOver() {
      isRunning = false;
      clearInterval(gameLoop);

      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
        try { localStorage.setItem('snake-high-score', highScore); } catch (_) {}
      }

      finalScoreEl.textContent = score;
      overlay.classList.add('active');
      draw();
    }

    function restart() {
      clearInterval(gameLoop);
      isRunning = true;
      init();
      gameLoop = setInterval(tick, speed);
      draw();
    }

    // ── Input ─────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      // 防止方向键滚动页面
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','KeyR'].includes(e.code)) {
        e.preventDefault();
      }

      if (!isRunning) {
        if (e.code === 'KeyR') restart();
        return;
      }

      switch (e.code) {
        case 'ArrowUp':    case 'KeyW': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  case 'KeyS': if (dir.y !== -1) nextDir = { x: 0, y:  1 }; break;
        case 'ArrowLeft':  case 'KeyA': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'KeyD': if (dir.x !== -1) nextDir = { x: 1,  y: 0 }; break;
        case 'Space':
          isPaused = !isPaused;
          draw();
          break;
        case 'KeyR':
          restart();
          break;
      }
    });

    // ── 移动端触控支持 ────────────────────────────────
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      if (!isRunning) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);

      if (Math.max(absDx, absDy) < 20) return; // 太小忽略

      if (absDx > absDy) {
        if (dx > 0 && dir.x !== -1) nextDir = { x: 1, y: 0 };
        else if (dx < 0 && dir.x !== 1) nextDir = { x: -1, y: 0 };
      } else {
        if (dy > 0 && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (dy < 0 && dir.y !== 1) nextDir = { x: 0, y: -1 };
      }
    });

    restartBtn.addEventListener('click', restart);

    // ── Start ─────────────────────────────────────────
    init();
    gameLoop = setInterval(tick, speed);
    draw();
  })();
</script>
</body>
</html>
